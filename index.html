<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan de Ahorro 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#1e293b;padding:16px}
.header{text-align:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #e2e8f0}
.header h1{font-size:20px;font-weight:600;color:#1e293b;margin-bottom:4px}
.header p{font-size:12px;color:#64748b}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat{background:#fff;border-radius:10px;padding:10px;border:1px solid #e2e8f0;text-align:center}
.stat-label{font-size:10px;color:#64748b;margin-bottom:3px}
.stat-val{font-size:15px;font-weight:600;color:#1e293b}
.progress{height:6px;background:#e2e8f0;border-radius:999px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:#16a34a;border-radius:999px;transition:width .3s}
.leyenda{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;font-size:11px;color:#64748b}
.ley{display:flex;align-items:center;gap:5px}
.ley-box{width:12px;height:12px;border-radius:3px;border:1px solid #cbd5e1;flex-shrink:0}
.mes-titulo{font-size:13px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:1px;margin:20px 0 8px;padding-bottom:6px;border-bottom:1px solid #e2e8f0}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px}
.dia{border-radius:8px;padding:5px 4px;border:1px solid #e2e8f0;min-height:62px;display:flex;flex-direction:column;justify-content:space-between;background:#fff;cursor:pointer;position:relative;transition:opacity .15s}
.dia.pico{background:#eff6ff;border-color:#93c5fd}
.dia.desc{background:#fffbeb;border-color:#fcd34d}
.dia.ok{opacity:.4}
.dia.ok::after{content:'';position:absolute;top:50%;left:5px;right:5px;height:2px;background:#dc2626;transform:rotate(-4deg)}
.dia-fecha{font-size:9px;color:#94a3b8}
.dia-sem{font-size:8px;color:#cbd5e1;text-transform:uppercase}
.dia-monto{font-size:10px;font-weight:600;color:#1e293b;margin-top:2px}
.dia-monto.az{color:#1d4ed8}
.dia-monto.am{color:#92400e}
.dia-check{width:14px;height:14px;border:1.5px solid #cbd5e1;border-radius:3px;background:#f8fafc;align-self:flex-end;flex-shrink:0}
.dia.ok .dia-check{background:#dc2626;border-color:#dc2626}
.mes-acum{font-size:11px;color:#94a3b8;text-align:right;margin-bottom:4px}
.status{text-align:center;font-size:11px;padding:6px;border-radius:8px;margin-bottom:12px;display:none}
.status.ok{background:#dcfce7;color:#16a34a;display:block}
.status.err{background:#fee2e2;color:#dc2626;display:block}
.status.cargando{background:#f1f5f9;color:#64748b;display:block}
</style>
</head>

  <div class="stat"><div class="stat-label">Avance</div><div class="stat-val" id="sp">0%</div></div>

let state={};

function fmt(n){return '$'+n.toLocaleString('es-CO')}

function showStatus(msg,tipo){
  const el=document.getElementById('status');
  el.className='status '+tipo;
  el.textContent=msg;
  if(tipo==='ok')setTimeout(()=>{el.style.display='none'},2000);
}

function acumHasta(idx){
  let s=0;
  MESES.forEach(m=>m.d.forEach(d=>{if(d.i<=idx)s+=d.a;}));
  return s;
}

function updateStats(){
  let dias=0,total=0;
  MESES.forEach(m=>m.d.forEach(d=>{if(state[d.i]){dias++;total+=d.a;}}));
  document.getElementById('sd').textContent=dias+' / 196';
  document.getElementById('sa').textContent=fmt(total);
  const pct=Math.round(total/META*100);
  document.getElementById('sp').textContent=pct+'%';
  document.getElementById('pg').style.width=Math.min(pct,100)+'%';
}

function guardarLocal(){
  try{localStorage.setItem('ahorro2026',JSON.stringify(state));}catch(e){}
}

function cargarLocal(){
  try{
    const v=localStorage.getItem('ahorro2026');
    if(v)state=JSON.parse(v);
  }catch(e){}
}

async function guardarRemoto(){
  try{
    const url=SCRIPT_URL+'?data='+encodeURIComponent(JSON.stringify(state));
    await fetch(url,{method:'GET',mode:'no-cors'});
    showStatus('Guardado','ok');
  }catch(e){
    showStatus('Guardado solo localmente','ok');
  }
}

async function cargarRemoto(){
  showStatus('Cargando...','cargando');
  try{
    const r=await fetch(SCRIPT_URL,{method:'GET'});
    const txt=await r.text();
    if(txt&&txt!=='{}'){
      const remoto=JSON.parse(txt);
      const diasRemoto=Object.keys(remoto).length;
      const diasLocal=Object.keys(state).length;
      if(diasRemoto>=diasLocal)state=remoto;
    }
    showStatus('Datos cargados','ok');
  }catch(e){
    showStatus('Usando datos locales','ok');
  }
  render();
}

function render(){
  const cont=document.getElementById('cont');
  cont.innerHTML='';
  MESES.forEach(mes=>{
    const totalMes=mes.d.reduce((s,d)=>s+d.a,0);
    const tit=document.createElement('div');
    tit.className='mes-titulo';
    tit.textContent=mes.m+' · '+fmt(totalMes);
    cont.appendChild(tit);

    const gr=document.createElement('div');
    gr.className='grid';
    mes.d.forEach(d=>{
      const c=document.createElement('div');
      const ph=d.p==='pico'?'pico':d.p==='desc'?'desc':'';
      c.className='dia'+(ph?' '+ph:'')+(state[d.i]?' ok':'');
      const mc=d.a>=100000?'az':d.a>=50000?'am':'';
      c.innerHTML=`<div><div style="display:flex;justify-content:space-between"><span class="dia-fecha">${d.f}</span><span class="dia-sem">${d.s}</span></div><div class="dia-monto ${mc}">${fmt(d.a)}</div></div><div class="dia-check"></div>`;
      c.addEventListener('click',()=>{
        if(state[d.i])delete state[d.i];else state[d.i]=true;
        c.classList.toggle('ok');
        updateStats();
        guardarLocal();
        guardarRemoto();
      });
      gr.appendChild(c);
    });
    cont.appendChild(gr);

    const last=mes.d[mes.d.length-1];
    const ac=document.createElement('div');
    ac.className='mes-acum';
    ac.textContent='Acumulado al '+last.f+': '+fmt(acumHasta(last.i));
    cont.appendChild(ac);
  });
  updateStats();
}

// Actualizar también el Apps Script para recibir GET con parámetro data
async function init(){
  cargarLocal();
  await cargarRemoto();
}

init();
